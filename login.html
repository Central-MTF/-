<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acceso a la Red</title>

<style>

body{
    margin:0;
    background:#05070d;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* FONDO */

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(255,0,0,0.08),
    transparent 70%);
    animation:pulse 8s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* GRID */

.grid{
    position:fixed;
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
}

/* LOGIN */

.container{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:420px;
    background:rgba(10,15,25,0.95);
    border:1px solid rgba(255,255,255,0.08);
    padding:40px;
    backdrop-filter:blur(10px);
}

.logo{
    text-align:center;
    font-size:32px;
    color:#ff2d2d;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#888;
}

input{
    width:100%;
    padding:14px;
    background:#080b12;
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#ff2d2d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff4d4d;
}

.msg{
    margin-top:20px;
    text-align:center;
    color:#00ff88;
}

.link{
    margin-top:20px;
    text-align:center;
}

.link a{
    color:#888;
    text-decoration:none;
}

.link a:hover{
    color:white;
}

/* TERMINAL */

.terminal{
    position:fixed;
    bottom:20px;
    left:20px;
    color:#00ff88;
    font-size:12px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="background"></div>
<div class="grid"></div>

<div class="container">

<div class="box">

<div class="logo">
[ ACCEDER A LA RED ]
</div>

<div class="subtitle">
Central del Cuartel General MTF
</div>

<div class="input-group">
<label>Correo</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" id="password">
</div>

<button onclick="login()">
ACCEDER
</button>

<div class="msg" id="msg"></div>

<div class="link">
<a href="register.html">
Crear Cuenta Operativa
</a>
</div>

</div>

</div>

<div class="terminal" id="terminal">
Inicializando sistema...
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMSkWW4wnzFoXtqA5o3a1Q1Y_xrweW_do",
  authDomain: "central-mtf.firebaseapp.com",
  projectId: "central-mtf",
  storageBucket: "central-mtf.firebasestorage.app",
  messagingSenderId: "565940103815",
  appId: "1:565940103815:web:0ceea344d9abf133af6622"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("msg").innerHTML =
"✔ Acceso concedido";

setTimeout(()=>{

window.location.href = "dashboard.html";

},2000);

}

catch(error){

document.getElementById("msg").innerHTML =
"Acceso denegado";

}

}

/* TERMINAL FAKE */

const lines = [

"Conectando con CENTRAL-MTF...",
"Verificando credenciales...",
"Cargando protocolos tácticos...",
"Inicializando red interna...",
"Esperando autorización..."

];

let i = 0;

setInterval(()=>{

document.getElementById("terminal").innerHTML =
lines[i];

i++;

if(i >= lines.length){

i = 0;

}

},2000);

</script>

</body>
</html>
