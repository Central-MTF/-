<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acceso a la Red</title>

<link rel="stylesheet" href="style.css">

<style>

.login-container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:400px;
    background:#0d1119;
    border:1px solid rgba(255,255,255,0.1);
    padding:40px;
}

.login-box h2{
    color:#ff2d2d;
    margin-bottom:20px;
    text-align:center;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#aaa;
}

.input-group input{
    width:100%;
    padding:12px;
    background:#05070d;
    border:1px solid rgba(255,255,255,0.1);
    color:white;
}

.login-button{
    width:100%;
    padding:14px;
    background:#ff2d2d;
    border:none;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.login-button:hover{
    background:#ff4d4d;
}

.access-text{
    margin-top:20px;
    color:#00ff88;
    text-align:center;
    display:none;
}

</style>

</head>

<body>

<div class="background-grid"></div>

<div class="login-container">

<div class="login-box">

<h2>[ ACCEDER A LA RED ]</h2>

<div class="input-group">
<label>Usuario</label>
<input type="text" id="user">
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" id="pass">
</div>

<button class="login-button" onclick="login()">
ACCEDER
</button>

<div class="access-text" id="accessText">
✔ Acceso concedido
</div>

</div>

</div>

<script>

function login(){

document.getElementById("accessText").style.display = "block";

setTimeout(() => {

window.location.href = "dashboard.html";

}, 2000);

}

</script>

</body>
</html>
