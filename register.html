<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Operativo</title>

<style>

body{
    margin:0;
    background:#05070d;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* FONDO */

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(255,0,0,0.08),
    transparent 70%);
    animation:pulse 6s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* LOGIN */

.container{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:420px;
    background:rgba(10,15,25,0.95);
    border:1px solid rgba(255,255,255,0.08);
    padding:40px;
    backdrop-filter:blur(10px);
}

h1{
    text-align:center;
    color:#ff2d2d;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#888;
}

input{
    width:100%;
    padding:14px;
    background:#080b12;
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#ff2d2d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff4d4d;
}

.msg{
    margin-top:20px;
    text-align:center;
    color:#00ff88;
}

.link{
    text-align:center;
    margin-top:20px;
}

.link a{
    color:#aaa;
    text-decoration:none;
}

.link a:hover{
    color:white;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<div class="box">

<h1>REGISTRO OPERATIVO</h1>

<div class="input-group">
<label>Correo</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" id="password">
</div>

<div class="input-group">
<label>Nombre Operativo</label>
<input type="text" id="operativo">
</div>

<button onclick="register()">
CREAR CUENTA
</button>

<div class="msg" id="msg"></div>

<div class="link">
<a href="login.html">
Volver al acceso
</a>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_AUTH_DOMAIN",
projectId: "TU_PROJECT_ID",
storageBucket: "TU_STORAGE",
messagingSenderId: "TU_SENDER_ID",
appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.register = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const operativo =
document.getElementById("operativo").value;

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;

await setDoc(doc(db,"usuarios",user.uid),{

operativo: operativo,

rango: "Cadete",

division: "Sin División",

acceso: "L1",

estado: "ACTIVO",

nivel: "OR-1"

});

document.getElementById("msg").innerHTML =
"✔ Cuenta creada";

setTimeout(()=>{

window.location.href = "login.html";

},2000);

}

catch(error){

document.getElementById("msg").innerHTML =
error.message;

}

}

</script>

</body>
</html>
